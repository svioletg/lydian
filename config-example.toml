# discord-vc-bot configuration

prefix = "-"
# debug: Enables various commands and features intended for developers. See the
#    README for a full description of what debug mode does:
#    https://github.com/svioletg/lydian-discord-bot/blob/main/README.md
debug = false # env: LYDIAN_DEBUG
# max_queue_length: Maximum number of items that can be added to the media
#    queue.
max-queue-length = 100
# max_filesize: Maximum filesize in bytes for media that can be downloaded by
#    the bot.
max-filesize = 20000000
# media_dir_warn_threshold: Total size in bytes that downloaded media can take
#    up before a warning is emitted at bot startup. Set to -1 to disable the
#    warning entirely.
media-dir-warn-threshold = 100000000

[command-aliases]
join = ["j"]
leave = ["l"]

[vote-skipping]
enabled = true
threshold-type = "percentage"
percentage = 50
exact = 3

[logging]
log-level = "INFO" # env: LYDIAN_LOG_LEVEL
# utc: Whether to show log timestamps in UTC. If false, they are shown in your
#    system's local time.
utc = true # env: LYDIAN_LOG_UTC
