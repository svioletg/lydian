# discord-vc-bot configuration

prefix = "-"
# [Environment variable: LYDIAN_DEBUG] Enables various commands and features intended for
# developers. Will also override the log level to "DEBUG".
debug = false
max-filesize = 20_000_000

[vote-skipping]
enabled = true
threshold-type = "percentage"
percentage = 50
exact = 3

[logging]
log-level = "INFO"
# [Environment variable: LYDIAN_LOG_UTC] Whether to show log timestamps in UTC. If false, they are
# shown in your system's local time.
utc = true
