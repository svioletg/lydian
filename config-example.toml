# discord-vc-bot configuration

prefix = "-"
# Enables various commands and features inteded for developers.
debug = false

[vote-skipping]
enabled = true
threshold-type = "percentage"
percentage = 50
exact = 3

[logging]
log-level = "INFO"
# Whether to show log timestamps in UTC. If false, they are shown in your system's local time.
utc = true
