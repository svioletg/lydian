name: Build project

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  build:
    name: Build project and try running it
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.14' ]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install project + dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
    - name: Try running
      run: lydian --version
